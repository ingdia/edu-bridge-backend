services:
  # PostgreSQL Database
  - type: pserv
    name: edubridge-db
    env: docker
    plan: free
    region: frankfurt
    databases:
      - name: edubridge
        user: edubridge_user

  # Backend API
  - type: web
    name: edubridge-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: edubridge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      # Add these manually in Render dashboard:
      # CLOUDINARY_CLOUD_NAME
      # CLOUDINARY_API_KEY
      # CLOUDINARY_API_SECRET
      # SMTP_HOST
      # SMTP_PORT
      # SMTP_USER
      # SMTP_PASS
